<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="100%" height="100%">
    <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="3" dy="3" stdDeviation="0" flood-color="#111" flood-opacity="0.85"/>
        </filter>
        <style>
            .brand { 
                font-family: 'Arial Black', Impact, sans-serif; 
                font-size: 54px; 
                font-style: italic; 
                font-weight: 900; 
                fill: #FFFFFF; 
                filter: url(#shadow); 
                letter-spacing: -1px;
            }
            .tagline { 
                font-family: 'Comic Sans MS', 'Inter', cursive, sans-serif; 
                font-size: 20px; 
                font-weight: 600; 
                font-style: italic; 
                fill: #FFFFFF; 
            }
        </style>
    </defs>
    
    <!-- Text -->
    <text x="5" y="65" class="brand">BRO'ETZA</text>
    <text x="10" y="95" class="tagline">Pizza with 'Aaha! 🍕😝</text>
    
    <!-- Pizza Slice Icon (Fan) -->
    <g transform="translate(280, 5)">
        <!-- Left Red Slice -->
        <path d="M 50 85 L 15 25 Q 35 10 60 15 Z" fill="#BC3330" stroke="#FFFFFF" stroke-width="4" stroke-linejoin="round" filter="url(#shadow)"/>
        <!-- Right Yellow Slice -->
        <path d="M 50 85 L 60 15 Q 85 25 95 55 Z" fill="#E5A948" stroke="#FFFFFF" stroke-width="4" stroke-linejoin="round" filter="url(#shadow)"/>
        
        <!-- White Dots (Toppings) -->
        <!-- On Red -->
        <circle cx="35" cy="35" r="5" fill="#FFFFFF" />
        <circle cx="42" cy="55" r="4.5" fill="#FFFFFF" />
        <!-- On Yellow -->
        <circle cx="68" cy="40" r="5" fill="#FFFFFF" />
        <circle cx="60" cy="60" r="4.5" fill="#FFFFFF" />
        
        <!-- Bottom Green Circle -->
        <circle cx="50" cy="85" r="14" fill="#4BA250" stroke="#FFFFFF" stroke-width="4" filter="url(#shadow)"/>
    </g>
</svg>
